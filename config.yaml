---
# Power Project Configuration
app:
  title: "U.S. Large Load Interconnection Tracker"
  min_mw: 1
  db_path: "data/power_project.db"
  log_level: "INFO"
  refresh_lock_file: "data/.refresh.lock"

sources:
  nyiso:
    enabled: true
    name: "NYISO Interconnection Queue"
    url: "https://www.nyiso.com/documents/20142/1407078/NYISO-Interconnection-Queue.xlsx"
    type: "xlsx"
    iso: "NYISO"
    category: "interconnection_queue"
    description: "NYISO official interconnection queue — load projects with MW, POI, and county"

  pjm:
    enabled: true
    name: "PJM Active Interconnection Queue"
    queue_url: "https://www.pjm.com/-/media/planning/services-requests/interconnection-queues/active-interconnection-requests.ashx"
    type: "xlsx"
    iso: "PJM"
    category: "interconnection_queue"
    description: "PJM active interconnection queue XLSX — filter Service Type=Load for demand projects"

  caiso:
    enabled: true
    name: "CAISO Generator Interconnection Queue"
    queue_url: "https://www.caiso.com/Documents/GeneratorInterconnectionQueue.xlsx"
    type: "xlsx"
    iso: "CAISO"
    category: "interconnection_queue"
    description: "CAISO GI queue — filter Fuel=DL (Demand Load) for large load projects"

  spp:
    enabled: true
    name: "SPP Generator Interconnection Queue"
    type: "xlsx"
    iso: "SPP"
    category: "interconnection_queue"
    description: "SPP GI status report — filter Resource Type=Load"

  miso:
    enabled: true
    name: "MISO Generator Interconnection Queue"
    type: "xlsx"
    iso: "MISO"
    category: "interconnection_queue"
    description: "MISO GI queue — filter Fuel Type=Load for demand projects"

  ercot:
    enabled: true
    name: "ERCOT New Large Load Integration"
    type: "xlsx"
    iso: "ERCOT"
    category: "interconnection_queue"
    description: "ERCOT NLL status report — all rows are large load projects (TX only)"

  iso_ne:
    enabled: true
    name: "ISO-NE Generator Interconnection Queue"
    queue_url: "https://www.iso-ne.com/static-assets/documents/100002/intercon_queue.xlsx"
    type: "xlsx"
    iso: "ISO-NE"
    category: "interconnection_queue"
    description: "ISO-NE GI queue — filter Resource Type=DR/Load for demand projects"

ferc_dockets:
  - id: "RM26-4"
    name: "Interconnection of Large Loads"
    url: "https://www.ferc.gov/rm26-4"
    search_keywords: ["data center", "large load", "co-located", "provisional load", "HILL", "hyperscale"]
    enabled: true

  - id: "CHAIRMAN_LETTER"
    name: "Chairman Rosner Letter on Large Load Forecasting"
    url: "https://www.ferc.gov/news-events/news/chairman-rosners-letter-rtosisos-large-load-forecasting"
    search_keywords: ["large load", "forecasting", "data center"]
    enabled: true

dedup:
  # Thresholds for fuzzy matching
  name_similarity_threshold: 85
  mw_tolerance_pct: 10.0
  # Fields used for dedup key when queue ID not available
  fuzzy_fields: ["project_name", "county", "state", "poi_text"]

iso_states:
  NYISO:
    - NY
  PJM:
    - PA
    - NJ
    - MD
    - DE
    - VA
    - WV
    - OH
    - IN
    - MI
    - IL
    - NC
    - DC
    - KY
    - TN
  MISO:
    - IL
    - IN
    - IA
    - MI
    - MN
    - MO
    - MT
    - ND
    - SD
    - WI
    - KY
    - MS
    - AR
    - TX
    - LA
  SPP:
    - KS
    - NE
    - OK
    - TX
    - SD
    - ND
    - MO
    - AR
    - LA
    - NM
    - CO
    - WY
    - MT
  CAISO:
    - CA
  ISO-NE:
    - CT
    - ME
    - MA
    - NH
    - RI
    - VT
  iso_ne:
    - CT
    - ME
    - MA
    - NH
    - RI
    - VT
  ERCOT:
    - TX

geocoding:
  enabled: false  # Set to true if you have a geocoding API key
  provider: "nominatim"  # nominatim (free) or google
  cache_db: "data/geocode_cache.db"
